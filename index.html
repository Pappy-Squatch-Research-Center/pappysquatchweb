<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pappy Squatch Research Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc; /* Tailwind slate-50 */
            overflow: hidden; /* Prevent scrollbars from glowing orbs */
        }
        
        .title-font {
            font-family: 'Creepster', system-ui;
            letter-spacing: 2px;
        }

        /* Glowing orb animation */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
            z-index: -1; /* Keep behind content */
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10vw, 10vh) scale(1.2); }
            100% { transform: translate(-10vw, -5vh) scale(0.9); }
        }

        /* Specific orb colors and positions */
        .orb-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: #166534; /* green-800 */ animation-delay: 0s; }
        .orb-2 { bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: #450a0a; /* red-950 */ animation-delay: -5s; }
        .orb-3 { top: 40%; left: 60%; width: 30vw; height: 30vw; background: #064e3b; /* emerald-900 */ animation-delay: -10s; }
        
        /* Subtle footprint path */
        .footprint-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.05;
        }
        .footprint {
            position: absolute;
            width: 60px;
            height: 100px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg"><path d="M 50 10 C 70 10, 85 30, 80 60 C 75 90, 60 140, 50 140 C 40 140, 25 90, 20 60 C 15 30, 30 10, 50 10 Z M 20 10 C 25 5, 30 10, 25 15 C 20 20, 15 15, 20 10 Z M 80 10 C 85 15, 80 20, 75 15 C 70 10, 75 5, 80 10 Z" fill="white"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Background Footprints (Decorative) -->
    <div class="footprint-container">
        <div class="footprint" style="bottom: 10%; left: 20%; transform: rotate(-15deg);"></div>
        <div class="footprint" style="bottom: 30%; left: 35%; transform: rotate(10deg);"></div>
        <div class="footprint" style="bottom: 50%; left: 50%; transform: rotate(-5deg);"></div>
        <div class="footprint" style="bottom: 70%; left: 70%; transform: rotate(20deg);"></div>
    </div>

    <!-- Main Content Container -->
    <main class="z-10 text-center px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto backdrop-blur-sm bg-slate-900/40 p-12 rounded-3xl border border-slate-700/50 shadow-2xl">
        
        <!-- Logo / Icon Area -->
        <div class="mb-8 flex justify-center">
            <svg class="w-24 h-24 text-emerald-600 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <!-- Abstract eye/forest icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2v3m0 14v3M4.929 4.929l2.121 2.121m9.9 9.9l2.121 2.121M19.071 4.929l-2.121 2.121m-9.9 9.9l-2.121 2.121"></path>
            </svg>
        </div>

        <!-- Title -->
        <h1 class="title-font text-5xl sm:text-7xl md:text-8xl text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-green-700 mb-4 drop-shadow-lg">
            Pappy Squatch
        </h1>
        <h2 class="text-2xl sm:text-3xl font-bold tracking-widest uppercase text-slate-300 mb-8">
            Research Center
        </h2>

        <!-- Tagline / Message -->
        <div class="space-y-4 mb-12">
            <p class="text-lg sm:text-xl text-slate-400 font-light max-w-2xl mx-auto leading-relaxed">
                We are currently deep in the woods, analyzing recent findings and preparing our digital basecamp.
            </p>
            <p class="text-md text-emerald-500 font-semibold italic">
                The truth is out there, and we're bringing it to light.
            </p>
        </div>

        <!-- Notification Form -->
       <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdzZPaYAQCihOUZQTREK-gxtRaBX8Y_zu5JTo0fiMHI9VSR6A/viewform?embedded=true" width="640" height="397" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>

    </main>

    <!-- Footer -->
    <footer class="absolute bottom-6 w-full text-center text-slate-500 text-sm z-10">
        <p>&copy; 2026 Pappy Squatch Research Center. All rights reserved.</p>
        <p class="mt-1 text-xs opacity-50">Classified // Do Not Distribute</p>
    </footer>

</body>
</html>
